name: CI

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    name: Test and Build (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gfortran \
            build-essential \
            unzip \
            curl \
            zip \
            pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc cmake unzip libomp

      - name: Set OpenMP and compiler environment (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "OpenMP_ROOT=$(brew --prefix libomp)" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$(brew --prefix libomp)" >> $GITHUB_ENV
          # Set compilers to use Homebrew GCC
          GCC_VERSION=$(ls $(brew --prefix gcc)/bin/gcc-* | grep -oE '[0-9]+$' | head -n1)
          echo "CC=$(brew --prefix gcc)/bin/gcc-${GCC_VERSION}" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix gcc)/bin/g++-${GCC_VERSION}" >> $GITHUB_ENV
          echo "FC=$(brew --prefix gcc)/bin/gfortran-${GCC_VERSION}" >> $GITHUB_ENV
          # Set vcpkg triplet based on architecture
          if [ "$(uname -m)" = "arm64" ]; then
            echo "VCPKG_DEFAULT_TRIPLET=arm64-osx" >> $GITHUB_ENV
          else
            echo "VCPKG_DEFAULT_TRIPLET=x64-osx" >> $GITHUB_ENV
          fi

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/installed
            vcpkg/packages
            vcpkg/buildtrees
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: |
          cd vcpkg
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./bootstrap-vcpkg.bat
          else
            ./bootstrap-vcpkg.sh
          fi
        shell: bash

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/
          retention-days: 7

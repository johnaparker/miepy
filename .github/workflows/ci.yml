name: CI

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    name: Test and Build (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gfortran \
            build-essential \
            unzip \
            curl \
            zip \
            pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc cmake unzip libomp

      - name: Set OpenMP and compiler environment (macOS)
        if: runner.os == 'macOS'
        run: |
          # Get paths
          LIBOMP_PREFIX=$(brew --prefix libomp)
          GCC_PREFIX=$(brew --prefix gcc)
          GCC_VERSION=$(ls ${GCC_PREFIX}/bin/gcc-* | grep -oE '[0-9]+$' | head -n1)

          # Set compiler paths
          GCC_PATH="${GCC_PREFIX}/bin/gcc-${GCC_VERSION}"
          GXX_PATH="${GCC_PREFIX}/bin/g++-${GCC_VERSION}"
          GFORTRAN_PATH="${GCC_PREFIX}/bin/gfortran-${GCC_VERSION}"

          # Set standard compiler environment variables
          echo "CC=${GCC_PATH}" >> $GITHUB_ENV
          echo "CXX=${GXX_PATH}" >> $GITHUB_ENV
          echo "FC=${GFORTRAN_PATH}" >> $GITHUB_ENV

          # Set OpenMP environment for CMake to find it
          echo "OpenMP_ROOT=${LIBOMP_PREFIX}" >> $GITHUB_ENV

          # Determine vcpkg triplet based on architecture
          if [ "$(uname -m)" = "arm64" ]; then
            VCPKG_TRIPLET="arm64-osx"
          else
            VCPKG_TRIPLET="x64-osx"
          fi

          # Set vcpkg overlay triplets path as environment variable
          echo "VCPKG_OVERLAY_TRIPLETS=${GITHUB_WORKSPACE}/vcpkg/triplets" >> $GITHUB_ENV

          # Build CMAKE_ARGS for scikit-build-core
          # NOTE: Do not set CMAKE_PREFIX_PATH here as it will override pybind11 discovery
          CMAKE_ARGS="-DCMAKE_C_COMPILER=${GCC_PATH}"
          CMAKE_ARGS="${CMAKE_ARGS} -DCMAKE_CXX_COMPILER=${GXX_PATH}"
          CMAKE_ARGS="${CMAKE_ARGS} -DCMAKE_Fortran_COMPILER=${GFORTRAN_PATH}"
          CMAKE_ARGS="${CMAKE_ARGS} -DVCPKG_TARGET_TRIPLET=${VCPKG_TRIPLET}"

          echo "CMAKE_ARGS=${CMAKE_ARGS}" >> $GITHUB_ENV

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/installed
            vcpkg/packages
            vcpkg/buildtrees
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: |
          cd vcpkg
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./bootstrap-vcpkg.bat
          else
            ./bootstrap-vcpkg.sh
          fi
        shell: bash

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/
          retention-days: 7
